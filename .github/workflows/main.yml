name: Readme Update

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 */1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Update README
        run: npm start

      - name: Check changes
        id: verify_diff
        run: |
          git diff --quiet . || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit & Push
        if: steps.verify_diff.outputs.changed == 'true'
        run: |
          git config --local user.email "hn1429@naver.com"
          git config --local user.name "godveryday"
          git add README.md
          git commit -m "Update README with latest blog posts"
          git push origin main
